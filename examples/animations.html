<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animation Gallery — corrupted-theme</title>
<!--
  One page to browse every shipped animation demo. Each tile lazy-loads the
  component's existing (verified) example page in an iframe on demand —
  nothing runs until you load it, keeping within the perf budget (§14:
  limit simultaneous animations). "Open ↗" views the full standalone page.
-->
<link rel="stylesheet" href="../src/css/theme.css">
<style>
  body { margin: 0; padding: var(--spacing-xl); background: var(--bg); color: var(--text); }
  h1 { font-family: 'Courier New', monospace; color: #00ffff; text-shadow: 0 0 12px rgba(0,255,255,0.5); }
  .intro { color: var(--text-secondary); max-width: 70ch; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: var(--spacing-lg); margin-top: var(--spacing-xl); }
  .demo-card { display: flex; flex-direction: column; gap: var(--spacing-sm); }
  .demo-card h2 { margin: 0; font-size: 1.1rem; font-family: 'Courier New', monospace; }
  .demo-card .tag { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .demo-card p { margin: 0; color: var(--text-secondary); font-size: 0.9rem; min-height: 2.6em; }
  .demo-frame { width: 100%; aspect-ratio: 16 / 10; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-secondary); display: grid; place-items: center; overflow: hidden; }
  .demo-frame iframe { width: 100%; height: 100%; border: 0; }
  .actions { display: flex; gap: var(--spacing-sm); }
</style>
</head>
<body>
<h1>▓▒░ ANIMATION GALLERY</h1>
<p class="intro">
  Every animation component shipped in <code>@whykusanagi/corrupted-theme</code> through the
  0.3.0 sprint. Click <strong>Load demo</strong> to run one inline (unloads when toggled off),
  or <strong>Open ↗</strong> for the full standalone example with source comments.
</p>

<div class="grid" id="grid"></div>

<script>
  const DEMOS = [
    { title: 'Stream Overlay Suite', tag: 'NEW · 0.3.0', src: 'stream-overlays.html',
      desc: 'ChromaticPulse, BinaryParticles, GlitchTitleCard, TerminalTakeover, StreamTicker — live + deterministic renderFrame modes.' },
    { title: 'CorruptedMandala', tag: 'NEW · 0.3.0', src: 'corrupted-mandala.html',
      desc: 'Procedural SVG sacred-geometry background: rotating phrase rings, staggered star pulses, mandorla halo, ornamental frame.' },
    { title: 'Canvas Transitions', tag: 'NEW · 0.3.0', src: 'transitions.html',
      desc: 'GeometricMorpher, NeuralDeserializer, SpectrumTerminal — full-viewport scene transitions built on AbyssalCableSystem + CRT effects.' },
    { title: 'Animation Blocks (×10)', tag: '0.2.0', src: 'animation-blocks/index.html',
      desc: 'TitleDecoder, ProgressBar, ScanlineSweep, TerminalBoot, GlitchPulse, ASCIIBorder, SystemDiagnostic, LoadingBarMulti, DataTransmission, TerminalPrompt.' },
    { title: 'CorruptedText', tag: 'core', src: 'basic/corrupted-text.html',
      desc: 'Multi-language glitch text with auto-scan of .corrupted-multilang elements.' },
    { title: 'TypingAnimation', tag: 'core', src: 'basic/typing-animation.html',
      desc: 'Streaming typed reveal with phrase-buffer flicker in the un-typed tail.' },
    { title: 'DecryptReveal', tag: 'core', src: 'advanced/decrypt-reveal.html',
      desc: 'Fixed-length decryption: scrambled charset resolves position-by-position to the target.' },
    { title: 'PhraseCycle', tag: 'core', src: 'advanced/phrase-cycle.html',
      desc: 'Discrete phrase-state cycling that settles on a final readable string (Pattern 2).' },
    { title: 'CRT Effects', tag: 'post-fx', src: 'advanced/crt-effects.html',
      desc: 'Scanlines, chromatic aberration, flicker, pixel distortion, CRT glow.' },
    { title: 'CorruptedVortex', tag: 'WebGL', src: 'advanced/glsl-vortex.html',
      desc: 'Raymarched spiral tunnel shader; hue-shiftable, quasar mode.' },
    { title: 'CorruptedParticles', tag: 'canvas', src: 'advanced/particles-bg.html',
      desc: 'Floating phrase background, 3 depth layers, hover repel + click burst.' },
    { title: 'Particles Background', tag: 'canvas', src: 'advanced/particles-background.html',
      desc: 'Behind-blur ambient particle field variant (DPR-tuned).' },
  ];

  const grid = document.getElementById('grid');
  for (const demo of DEMOS) {
    const card = document.createElement('div');
    card.className = 'card demo-card';

    const tag = document.createElement('div'); tag.className = 'tag'; tag.textContent = demo.tag;
    const h2 = document.createElement('h2'); h2.textContent = demo.title;
    const p = document.createElement('p'); p.textContent = demo.desc;
    const frame = document.createElement('div'); frame.className = 'demo-frame';
    const hint = document.createElement('span'); hint.className = 'tag'; hint.textContent = '· idle ·';
    frame.appendChild(hint);

    const actions = document.createElement('div'); actions.className = 'actions';
    const loadBtn = document.createElement('button'); loadBtn.className = 'btn'; loadBtn.textContent = 'Load demo';
    const openLink = document.createElement('a'); openLink.className = 'btn'; openLink.textContent = 'Open ↗';
    openLink.href = demo.src; openLink.target = '_blank'; openLink.rel = 'noopener';
    actions.append(loadBtn, openLink);

    loadBtn.addEventListener('click', () => {
      const active = frame.querySelector('iframe');
      if (active) {
        active.remove();               // unload = stop all its animations
        frame.appendChild(hint);
        loadBtn.textContent = 'Load demo';
      } else {
        hint.remove();
        const iframe = document.createElement('iframe');
        iframe.src = demo.src;
        iframe.loading = 'lazy';
        iframe.title = demo.title;
        frame.appendChild(iframe);
        loadBtn.textContent = 'Unload';
      }
    });

    card.append(tag, h2, p, frame, actions);
    grid.appendChild(card);
  }
</script>
</body>
</html>
